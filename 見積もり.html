[&quot;恒温恒湿器&quot;,&quot;エスペック&quot;,&quot;PSL-2KTH&quot;,340,&quot;無機材料・資源科&quot;,&quot;窯業&quot;,&quot;浜田&quot;],
[&quot;示差熱－熱重量同時測定装置&quot;,&quot;リガク&quot;,&quot;TG-8120&quot;,210,&quot;無機材料・資源科&quot;,&quot;窯業&quot;,&quot;浜田&quot;],
[&quot;熱機械分析装置&quot;,&quot;リガク&quot;,&quot;TMA-8310&quot;,290,&quot;無機材料・資源科&quot;,&quot;窯業&quot;,&quot;浜田&quot;],
[&quot;万能試験機（25kN）&quot;,&quot;エー・アンド・デイ&quot;,&quot;RTF-2350&quot;,460,&quot;無機材料・資源科&quot;,&quot;窯業&quot;,&quot;浜田&quot;],
[&quot;照明測定室&quot;,&quot;&quot;,&quot;&quot;,50,&quot;無機材料・資源科&quot;,&quot;機械・金属・電子&quot;,&quot;浜田&quot;],

[&quot;糖度計&quot;,&quot;&quot;,&quot;&quot;,50,&quot;食品技術科&quot;,&quot;汎用&quot;,&quot;浜田&quot;],
[&quot;電子天秤&quot;,&quot;&quot;,&quot;&quot;,50,&quot;各科&quot;,&quot;汎用&quot;,&quot;浜田&quot;],
[&quot;乾燥器&quot;,&quot;&quot;,&quot;&quot;,50,&quot;各科&quot;,&quot;汎用&quot;,&quot;浜田&quot;],
[&quot;pH計&quot;,&quot;&quot;,&quot;&quot;,50,&quot;各科&quot;,&quot;汎用&quot;,&quot;浜田&quot;]
];

/* ===== 状態 ===== */
const EXPLAIN_UNIT=4200, PREP_UNIT=330;
let cart=[]; // {idx, hours}
const FREQ_MAX=5; // 履歴の最大表示件数
const FREQ_KEY=&quot;shimane_equip_freq&quot;;

/* 履歴は「最近使った順」の配列で保持（最大5件）。旧形式{name:count}は件数順に変換 */
function loadFreq(){
  try{const v=JSON.parse(localStorage.getItem(FREQ_KEY));
    if(Array.isArray(v))return v;
    if(v &amp;&amp; typeof v===&quot;object&quot;)return Object.entries(v).sort((a,b)=>b[1]-a[1]).map(e=>e[0]).slice(0,FREQ_MAX);
  }catch(e){}
  return [];
}
function saveFreq(a){try{localStorage.setItem(FREQ_KEY,JSON.stringify(a))}catch(e){}}
function bumpFreq(name){let a=loadFreq().filter(n=>n!==name);a.unshift(name);if(a.length>FREQ_MAX)a=a.slice(0,FREQ_MAX);saveFreq(a);renderFreq();}
function delFreq(name){saveFreq(loadFreq().filter(n=>n!==name));renderFreq();}

const yen=n=>n.toLocaleString(&quot;ja-JP&quot;)+&quot;円&quot;;
const $=id=>document.getElementById(id);

/* ===== 分類セレクト ===== */
(function(){
  const cats=[...new Set(D.map(d=>d[6]+&quot;／&quot;+d[5]))];
  cats.forEach(c=>{const o=document.createElement(&quot;option&quot;);o.value=c;o.textContent=c;$(&quot;cat&quot;).appendChild(o);});
})();

/* ===== よく使う機器（履歴） ===== */
function renderFreq(){
  const names=loadFreq().filter(n=>D.some(d=>d[0]===n));
  const box=$(&quot;freq&quot;);
  if(names.length===0){box.innerHTML=&quot;&quot;;return;}
  box.innerHTML='<span style=&quot;font-size:11px;color:var(--sub);width:100%&quot;>よく使う機器（履歴）</span>';
  names.forEach(name=>{
    const idx=D.findIndex(d=>d[0]===name);
    if(idx<0)return;
    const c=document.createElement(&quot;span&quot;);
    c.className=&quot;chip&quot;;
    const label=document.createElement(&quot;span&quot;);
    label.innerHTML=esc(name);
    label.onclick=()=>addItem(idx);
    const x=document.createElement(&quot;span&quot;);
    x.className=&quot;chipdel&quot;;
    x.textContent=&quot;×&quot;;
    x.title=&quot;履歴から削除&quot;;
    x.onclick=e=>{e.stopPropagation();delFreq(name);};
    c.appendChild(label);
    c.appendChild(x);
    box.appendChild(c);
  });
}

/* ===== 検索リスト ===== */
/* 検索用の小文字キャッシュ（初回のみ生成） */
const HAY=D.map(d=>(d[0]+&quot; &quot;+d[1]+&quot; &quot;+d[2]).toLowerCase());
function renderList(){
  const q=$(&quot;q&quot;).value.trim().toLowerCase();
  const cat=$(&quot;cat&quot;).value;
  const list=$(&quot;list&quot;);
  let html=&quot;&quot;,n=0;
  for(let i=0;i<D.length;i++){
    const d=D[i];
    if(cat &amp;&amp; (d[6]+&quot;／&quot;+d[5])!==cat)continue;
    if(q &amp;&amp; !HAY[i].includes(q))continue;
    if(++n>300)break;
    html+=`<div class=&quot;item&quot; data-i=&quot;${i}&quot;><div class=&quot;meta&quot;><div class=&quot;nm&quot;>${esc(d[0])}</div>`
      +`<div class=&quot;mk&quot;>${esc([d[1],d[2]].filter(Boolean).join(&quot; / &quot;))}</div></div>`
      +`<span class=&quot;tag&quot;>${esc(d[6])}</span>`
      +`<span class=&quot;pr&quot;>${d[3].toLocaleString()}円/時</span></div>`;
  }
  list.innerHTML=n?html:'<div class=&quot;empty&quot;>該当する機器がありません。</div>';
}
/* クリックは一度だけ委譲 */
$(&quot;list&quot;).addEventListener(&quot;click&quot;,e=>{
  const it=e.target.closest(&quot;.item&quot;);
  if(it)addItem(+it.dataset.i);
});
function esc(s){return (s||&quot;&quot;).replace(/[&amp;<>]/g,c=>({&quot;&amp;&quot;:&quot;&amp;amp;&quot;,&quot;<&quot;:&quot;&amp;lt;&quot;,&quot;>&quot;:&quot;&amp;gt;&quot;}[c]));}

/* ===== カート操作 ===== */
function addItem(idx){
  const ex=cart.find(c=>c.idx===idx);
  if(ex){ex.hours+=1;}else{cart.push({idx,hours:1});}
  bumpFreq(D[idx][0]);
  renderCart();
}
function renderCart(){
  const tb=$(&quot;rows&quot;);
  $(&quot;emptyRows&quot;).style.display=cart.length?&quot;none&quot;:&quot;block&quot;;
  let html=&quot;&quot;;
  cart.forEach((c,ci)=>{
    const d=D[c.idx];
    const sub=Math.round(d[3]*c.hours);
    html+=`<tr><td><div style=&quot;font-weight:600&quot;>${esc(d[0])}</div>`
      +`<div style=&quot;font-size:11px;color:var(--sub)&quot;>${esc([d[1],d[2]].filter(Boolean).join(&quot; &quot;))}</div></td>`
      +`<td class=&quot;num&quot;>${d[3].toLocaleString()}</td>`
      +`<td class=&quot;num&quot;><input class=&quot;qty&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;1&quot; value=&quot;${c.hours}&quot; data-ci=&quot;${ci}&quot;></td>`
      +`<td class=&quot;num&quot; data-sub=&quot;${ci}&quot;>${sub.toLocaleString()}</td>`
      +`<td><button class=&quot;del&quot; data-del=&quot;${ci}&quot; title=&quot;削除&quot; aria-label=&quot;削除&quot;>`
      +`<svg viewBox=&quot;0 0 24 24&quot; width=&quot;16&quot; height=&quot;16&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;>`
      +`<polyline points=&quot;3 6 5 6 21 6&quot;></polyline>`
      +`<path d=&quot;M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6&quot;></path>`
      +`<path d=&quot;M10 11v6M14 11v6&quot;></path>`
      +`<path d=&quot;M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2&quot;></path>`
      +`</svg></button></td></tr>`;
  });
  tb.innerHTML=html;
  // 準備料は見積もり1件あたり固定
  calc();
}
/* qty入力・削除はイベント委譲（再描画ごとの再バインド不要） */
$(&quot;rows&quot;).addEventListener(&quot;input&quot;,e=>{
  const inp=e.target.closest(&quot;.qty&quot;);
  if(inp){cart[+inp.dataset.ci].hours=parseInt(inp.value)||0;calc();}
});
$(&quot;rows&quot;).addEventListener(&quot;click&quot;,e=>{
  const b=e.target.closest(&quot;.del&quot;);
  if(b){cart.splice(+b.dataset.del,1);renderCart();}
});

/* ===== 計算 ===== */
function mult(){return $(&quot;outside&quot;).checked?2:1;}
function calc(){
  const m=mult();
  let equip=0;
  cart.forEach((c,ci)=>{
    const d=D[c.idx];
    const sub=Math.round(d[3]*c.hours*m);
    const cell=document.querySelector('[data-sub=&quot;'+ci+'&quot;]');
    if(cell)cell.textContent=sub.toLocaleString();
    equip+=sub;
  });
  const eh=parseInt($(&quot;explainH&quot;).value)||0;
  const pn=cart.length>0?1:0;
  const explain=Math.round(EXPLAIN_UNIT*eh*m);
  const prep=Math.round(PREP_UNIT*pn*m);
  $(&quot;explainAmt&quot;).textContent=yen(explain);
  $(&quot;explainUnit&quot;).textContent=(EXPLAIN_UNIT*m).toLocaleString()+&quot;円 ×&quot;;
  $(&quot;prepAmt&quot;).textContent=yen(prep);
  $(&quot;grand&quot;).textContent=yen(equip+explain+prep);
  return {equip,explain,prep,eh,pn,total:equip+explain+prep,m};
}

/* ===== コピー用テキスト ===== */
function buildText(){
  const r=calc();
  let t=&quot;&quot;;
  let n=0;
  cart.forEach((c)=>{
    const d=D[c.idx];
    const sub=Math.round(d[3]*c.hours*r.m);
    if(sub<=0)return;
    n++;
    t+=n+&quot;. &quot;+d[0];
    const mk=[d[1],d[2]].filter(Boolean).join(&quot; &quot;);
    if(mk)t+=&quot;（&quot;+mk+&quot;）&quot;;
    t+=&quot;\n   &quot;+(d[3]*r.m).toLocaleString()+&quot;円/時 × &quot;+c.hours+&quot;時間 = &quot;+yen(sub)+&quot;\n&quot;;
  });
  t+=&quot;\n機器使用料 小計： &quot;+yen(r.equip)+&quot;\n&quot;;
  if(r.eh>0)t+=&quot;説明料： &quot;+(EXPLAIN_UNIT*r.m).toLocaleString()+&quot;円×&quot;+r.eh+&quot;時間 = &quot;+yen(r.explain)+&quot;\n&quot;;
  if(r.pn>0)t+=&quot;準備料： &quot;+yen(r.prep)+&quot;\n&quot;;
  t+=&quot;───────────────\n&quot;;
  t+=&quot;合計： &quot;+yen(r.total)+&quot;\n&quot;;
  return t;
}
function buildDetail(){
  const r=calc();const rows=[];
  cart.forEach(c=>{
    const d=D[c.idx];const sub=Math.round(d[3]*c.hours*r.m);if(sub<=0)return;
    const mk=[d[1],d[2]].filter(Boolean).join(&quot; &quot;);
    rows.push({name:d[0]+(mk?&quot;（&quot;+mk+&quot;）&quot;:&quot;&quot;),note:(d[3]*r.m).toLocaleString()+&quot;円/時 × &quot;+c.hours+&quot;時間&quot;,amount:sub});
  });
  const extras=[{label:&quot;機器使用料 小計&quot;,amount:r.equip}];
  if(r.eh>0)extras.push({label:&quot;説明料（&quot;+(EXPLAIN_UNIT*r.m).toLocaleString()+&quot;円×&quot;+r.eh+&quot;時間）&quot;,amount:r.explain});
  if(r.pn>0)extras.push({label:&quot;準備料&quot;,amount:r.prep});
  return {rows,extras,total:r.total,outside:r.m===2};
}
function captureState(){return {cart:cart.map(c=>({idx:c.idx,hours:c.hours})),outside:$(&quot;outside&quot;).checked,explainH:$(&quot;explainH&quot;).value};}
function restoreState(s){
  try{
    cart=(s.cart||[]).map(c=>({idx:c.idx,hours:c.hours}));
    $(&quot;outside&quot;).checked=!!s.outside;
    if(s.explainH!=null)$(&quot;explainH&quot;).value=s.explainH;
    renderCart();toast(&quot;履歴から復元しました&quot;);
  }catch(e){}
}
window.addEventListener(&quot;message&quot;,e=>{
  const m=e.data;if(m&amp;&amp;m.type===&quot;restore-est&quot;&amp;&amp;m.source===&quot;機器開放&quot;)restoreState(m.state);
});
function saveHistory(t){
  try{
    if(!t||!t.trim())return;
    const K=&quot;shimane_estimator_history&quot;;
    let a=JSON.parse(localStorage.getItem(K)||&quot;[]&quot;);
    if(!Array.isArray(a))a=[];
    a.unshift({id:Date.now()+&quot;_&quot;+Math.random().toString(36).slice(2,7),ts:Date.now(),source:&quot;機器開放&quot;,text:t,detail:buildDetail(),state:captureState()});
    if(a.length>50)a=a.slice(0,50);
    localStorage.setItem(K,JSON.stringify(a));
  }catch(e){}
}
function copyText(){
  const t=buildText();
  saveHistory(t);
  const done=()=>toast(&quot;コピーしました&quot;);
  if(navigator.clipboard&amp;&amp;navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));
  }else fallbackCopy(t,done);
}
function fallbackCopy(t,cb){
  const ta=document.createElement(&quot;textarea&quot;);ta.value=t;document.body.appendChild(ta);
  ta.select();try{document.execCommand(&quot;copy&quot;);cb();}catch(e){alert(&quot;コピーできませんでした。\n\n&quot;+t);}
  document.body.removeChild(ta);
}
function toast(m){const e=$(&quot;toast&quot;);e.textContent=m;e.classList.add(&quot;show&quot;);setTimeout(()=>e.classList.remove(&quot;show&quot;),1600);}

/* ===== イベント ===== */
let _t;$(&quot;q&quot;).oninput=()=>{clearTimeout(_t);_t=setTimeout(renderList,120);};
$(&quot;cat&quot;).onchange=renderList;
$(&quot;outside&quot;).onchange=calc;
$(&quot;explainH&quot;).oninput=calc;
$(&quot;copy&quot;).onclick=copyText;
$(&quot;clear&quot;).onclick=()=>{if(confirm(&quot;見積もりをクリアしますか？&quot;)){cart=[];$(&quot;explainH&quot;).value=0;renderCart();}};

renderFreq();renderList();renderCart();
</script>

/* ===== 料金計算 ===== */
function calcPrice(d,qty){
  qty=qty||0;
  switch(d.t){
    case &quot;linear&quot;: return d.p*qty;
    case &quot;ceil&quot;:   return d.p*Math.ceil(qty);
    case &quot;group&quot;:  return d.p*Math.ceil(qty/d.g);
    case &quot;add&quot;:    return qty<=0?0:Math.round(d.p+d.a*(qty-1));
    case &quot;group_add&quot;: return qty<=0?0:(qty<=d.g?d.p:d.p+d.a*(qty-d.g));
    case &quot;time_add&quot;:  return qty<=0?0:(qty<=1?d.p:d.p+d.a*Math.ceil(qty-1));
    case &quot;time_plus&quot;: return qty<=0?0:d.p*Math.ceil(qty)+d.f;
    default: return 0;
  }
}
/* 料金表記（「試験を選ぶ」リスト用・省略なしの正式表記）
   PDFの文言と生成が食い違う項目は各データの r で上書き。 */
function priceLabel(d){
  if(d.r) return d.r;
  const p=d.p.toLocaleString();
  const a=d.a?d.a.toLocaleString():&quot;&quot;;
  const head={&quot;試料&quot;:&quot;1試料につき&quot;,&quot;項目&quot;:&quot;1試料1項目につき&quot;,&quot;元素&quot;:&quot;1試料1元素につき&quot;,&quot;成分&quot;:&quot;1試料1成分につき&quot;,&quot;試験&quot;:&quot;1試料1試験につき&quot;,&quot;種類&quot;:&quot;1種類につき&quot;,&quot;試薬&quot;:&quot;1試薬500mLまでにつき&quot;,&quot;件&quot;:&quot;1件につき&quot;,&quot;通&quot;:&quot;1通につき&quot;};
  switch(d.t){
    case &quot;linear&quot;: return (head[d.u]||(&quot;1&quot;+d.u+&quot;につき&quot;))+p+&quot;円&quot;;
    case &quot;ceil&quot;:   return &quot;1件1時間までごとに&quot;+p+&quot;円&quot;;
    case &quot;group&quot;:  return &quot;1試料&quot;+d.g+d.u+&quot;までごとに&quot;+p+&quot;円&quot;;
    case &quot;add&quot;:    return &quot;1試料1&quot;+d.u+&quot;につき&quot;+p+&quot;円、1&quot;+d.u+&quot;増すごとに&quot;+a+&quot;円加算&quot;;
    case &quot;group_add&quot;: return &quot;1試料&quot;+d.g+d.u+&quot;まで&quot;+p+&quot;円、1&quot;+d.u+&quot;増すごとに&quot;+a+&quot;円加算&quot;;
    case &quot;time_add&quot;:  return &quot;1試料1時間までにつき&quot;+p+&quot;円、1時間増すごとに&quot;+a+&quot;円加算&quot;;
    case &quot;time_plus&quot;: return &quot;1件1時間につき&quot;+p+&quot;円、1件につき（後処理）&quot;+d.f.toLocaleString()+&quot;円&quot;;
    default: return &quot;&quot;;
  }
}
/* 現在数量での計算内訳（明細表示用） */
function calcBreakdown(d,qty){
  qty=qty||0;
  const y=n=>n.toLocaleString();
  switch(d.t){
    case &quot;linear&quot;: return y(d.p)+&quot;×&quot;+qty+d.u;
    case &quot;ceil&quot;:   return y(d.p)+&quot;×&quot;+Math.ceil(qty)+d.u+&quot;(切上)&quot;;
    case &quot;group&quot;:  return y(d.p)+&quot;×&quot;+Math.ceil(qty/d.g)+&quot;組(&quot;+d.g+d.u+&quot;ごと)&quot;;
    case &quot;add&quot;:    return qty<=0?&quot;-&quot;:(qty<=1?y(d.p):y(d.p)+&quot;+&quot;+y(d.a)+&quot;×&quot;+(qty-1));
    case &quot;group_add&quot;: return qty<=0?&quot;-&quot;:(qty<=d.g?y(d.p)+&quot;(&quot;+d.g+d.u+&quot;まで)&quot;:y(d.p)+&quot;+&quot;+y(d.a)+&quot;×&quot;+(qty-d.g));
    case &quot;time_add&quot;:  return qty<=0?&quot;-&quot;:(qty<=1?y(d.p):y(d.p)+&quot;+&quot;+y(d.a)+&quot;×&quot;+Math.ceil(qty-1));
    case &quot;time_plus&quot;: return qty<=0?&quot;-&quot;:y(d.p)+&quot;×&quot;+Math.ceil(qty)+&quot;+後&quot;+y(d.f);
    default: return &quot;&quot;;
  }
}

/* ===== 行(part)単位のヘルパー =====
   加算型(add/group_add/time_add)は「基本(base)」「追加(add)」の2行に分割。
   それ以外は part:null の1行。 */
function isSplit(d){return d.t===&quot;add&quot;||d.t===&quot;group_add&quot;||d.t===&quot;time_add&quot;;}
function baseUnit(d){return d.t===&quot;add&quot;?&quot;試料&quot;:&quot;件&quot;;}
function baseLabel(d){
  if(d.t===&quot;add&quot;)       return &quot;基本：1試料1&quot;+d.u;
  if(d.t===&quot;group_add&quot;) return &quot;基本：&quot;+d.g+d.u+&quot;まで/件&quot;;
  if(d.t===&quot;time_add&quot;)  return &quot;基本：最初の1&quot;+d.u;
  return &quot;&quot;;
}
function lineUnit(c){const d=D[c.idx];return c.part===&quot;base&quot;?baseUnit(d):d.u;}
function linePrice(c){const d=D[c.idx];return c.part===&quot;add&quot;?d.a:d.p;}
function lineName(c){const d=D[c.idx];
  if(c.part===&quot;base&quot;) return d.n+&quot;（&quot;+baseLabel(d)+&quot;）&quot;;
  if(c.part===&quot;add&quot;)  return d.n+&quot;（追加&quot;+d.u+&quot;）&quot;;
  return d.n;
}
function lineAmount(c){const d=D[c.idx];
  if(c.part===&quot;base&quot;) return d.p*c.qty;
  if(c.part===&quot;add&quot;)  return d.a*Math.ceil(c.qty);
  return calcPrice(d,c.qty);
}
function lineBreakdown(c){const d=D[c.idx];const y=n=>n.toLocaleString();
  if(c.part===&quot;base&quot;) return c.qty>0?y(d.p)+&quot;×&quot;+c.qty+baseUnit(d):&quot;-&quot;;
  if(c.part===&quot;add&quot;)  return c.qty>0?y(d.a)+&quot;×&quot;+Math.ceil(c.qty)+d.u:&quot;-&quot;;
  return calcBreakdown(d,c.qty);
}

/* ===== 状態 ===== */
const PREP_UNIT=710;
let cart=[]; // {idx, qty}
const FREQ_MAX=5; // 履歴の最大表示件数
const FREQ_KEY=&quot;shimane_test_freq&quot;;

/* 履歴は「最近使った順」の配列で保持（最大5件）。旧形式{name:count}は件数順に変換 */
function loadFreq(){
  try{const v=JSON.parse(localStorage.getItem(FREQ_KEY));
    if(Array.isArray(v))return v;
    if(v &amp;&amp; typeof v===&quot;object&quot;)return Object.entries(v).sort((a,b)=>b[1]-a[1]).map(e=>e[0]).slice(0,FREQ_MAX);
  }catch(e){}
  return [];
}
function saveFreq(a){try{localStorage.setItem(FREQ_KEY,JSON.stringify(a))}catch(e){}}
function bumpFreq(name){let a=loadFreq().filter(n=>n!==name);a.unshift(name);if(a.length>FREQ_MAX)a=a.slice(0,FREQ_MAX);saveFreq(a);renderFreq();}
function removeFreq(name){saveFreq(loadFreq().filter(n=>n!==name));renderFreq();}

const yen=n=>Math.round(n).toLocaleString(&quot;ja-JP&quot;)+&quot;円&quot;;
const $=id=>document.getElementById(id);

/* ===== 分類セレクト ===== */
(function(){
  const cats=[...new Set(D.map(d=>d.c))];
  cats.forEach(c=>{const o=document.createElement(&quot;option&quot;);o.value=c;o.textContent=c;$(&quot;cat&quot;).appendChild(o);});
})();

/* ===== よく使う試験（履歴） ===== */
function renderFreq(){
  const names=loadFreq().filter(n=>D.some(d=>d.n===n));
  const box=$(&quot;freq&quot;);
  if(names.length===0){box.innerHTML=&quot;&quot;;return;}
  box.innerHTML='<span style=&quot;font-size:11px;color:var(--sub);width:100%&quot;>よく使う試験（履歴）</span>';
  names.forEach(name=>{
    const idx=D.findIndex(d=>d.n===name);
    if(idx<0)return;
    const c=document.createElement(&quot;span&quot;);
    c.className=&quot;chip&quot;;
    const label=document.createElement(&quot;span&quot;);
    label.className=&quot;chip-label&quot;;
    label.textContent=name.length>22?name.slice(0,21)+&quot;…&quot;:name;
    c.appendChild(label);
    c.title=name;
    const x=document.createElement(&quot;span&quot;);
    x.className=&quot;chip-x&quot;;
    x.textContent=&quot;×&quot;;
    x.title=&quot;履歴から削除&quot;;
    x.onclick=e=>{e.stopPropagation();removeFreq(name);};
    c.appendChild(x);
    c.onclick=()=>addItem(idx);
    box.appendChild(c);
  });
}

/* ===== 検索リスト ===== */
/* 検索用の小文字キャッシュ（初回のみ生成） */
const HAY=D.map(d=>(d.n+&quot; &quot;+d.c+&quot; &quot;+d.d).toLowerCase());
function renderList(){
  const q=$(&quot;q&quot;).value.trim().toLowerCase();
  const cat=$(&quot;cat&quot;).value;
  const list=$(&quot;list&quot;);
  let html=&quot;&quot;,n=0;
  for(let i=0;i<D.length;i++){
    const d=D[i];
    if(cat &amp;&amp; d.c!==cat)continue;
    if(q &amp;&amp; !HAY[i].includes(q))continue;
    n++;
    html+=`<div class=&quot;item&quot; data-i=&quot;${i}&quot;><div class=&quot;meta&quot;><div class=&quot;nm&quot;>${esc(d.n)}</div>`
      +`<div class=&quot;mk&quot;>${esc(d.c+&quot; ／ &quot;+d.d)}</div>`
      +`<div class=&quot;rule&quot;>${esc(priceLabel(d))}</div></div></div>`;
  }
  list.innerHTML=n?html:'<div class=&quot;empty&quot;>該当する試験がありません。</div>';
}
/* クリックは一度だけ委譲 */
$(&quot;list&quot;).addEventListener(&quot;click&quot;,e=>{
  const it=e.target.closest(&quot;.item&quot;);
  if(it)addItem(+it.dataset.i);
});
function esc(s){return (s||&quot;&quot;).replace(/[&amp;<>]/g,c=>({&quot;&amp;&quot;:&quot;&amp;amp;&quot;,&quot;<&quot;:&quot;&amp;lt;&quot;,&quot;>&quot;:&quot;&amp;gt;&quot;}[c]));}

/* ===== カート操作 ===== */
function addItem(idx){
  const d=D[idx];
  const exist=cart.find(c=>c.idx===idx &amp;&amp; (c.part===null||c.part===&quot;base&quot;));
  if(exist){
    exist.qty=(parseFloat(exist.qty)||0)+1;
    bumpFreq(d.n);
    renderCart();
    toast(&quot;既に追加済みのため数量を+1しました&quot;);
    return;
  }
  if(isSplit(d)){
    cart.push({idx,qty:1,part:&quot;base&quot;});
    cart.push({idx,qty:0,part:&quot;add&quot;});
  }else{
    cart.push({idx,qty:1,part:null});
  }
  bumpFreq(d.n);
  renderCart();
}
function renderCart(){
  const tb=$(&quot;rows&quot;);
  $(&quot;emptyRows&quot;).style.display=cart.length?&quot;none&quot;:&quot;block&quot;;
  let html=&quot;&quot;;
  cart.forEach((c,ci)=>{
    const u=lineUnit(c);
    html+=`<tr><td><div style=&quot;font-weight:600&quot;>${esc(lineName(c))}</div>`
      +`<div style=&quot;font-size:11px;color:var(--sub)&quot;>${esc(linePrice(c).toLocaleString()+&quot;円/&quot;+u)}</div></td>`
      +`<td class=&quot;num&quot;>${linePrice(c).toLocaleString()}</td>`
      +`<td class=&quot;num&quot;><input class=&quot;qty&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;${u===&quot;時間&quot;?&quot;0.5&quot;:&quot;1&quot;}&quot; value=&quot;${c.qty}&quot; data-ci=&quot;${ci}&quot;><span class=&quot;unit&quot;>${esc(u)}</span></td>`
      +`<td class=&quot;num&quot;><div data-sub=&quot;${ci}&quot;>0</div><div class=&quot;unit&quot; data-bd=&quot;${ci}&quot;></div></td>`
      +`<td><button class=&quot;del&quot; data-del=&quot;${ci}&quot; title=&quot;削除&quot; aria-label=&quot;削除&quot;>`
      +`<svg viewBox=&quot;0 0 24 24&quot; width=&quot;16&quot; height=&quot;16&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;>`
      +`<polyline points=&quot;3 6 5 6 21 6&quot;></polyline>`
      +`<path d=&quot;M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6&quot;></path>`
      +`<path d=&quot;M10 11v6M14 11v6&quot;></path>`
      +`<path d=&quot;M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2&quot;></path>`
      +`</svg></button></td></tr>`;
  });
  tb.innerHTML=html;
  calc();
}
/* qty入力・削除はイベント委譲（再描画ごとの再バインド不要） */
$(&quot;rows&quot;).addEventListener(&quot;input&quot;,e=>{
  const inp=e.target.closest(&quot;.qty&quot;);
  if(inp){cart[+inp.dataset.ci].qty=parseFloat(inp.value)||0;calc();}
});
$(&quot;rows&quot;).addEventListener(&quot;click&quot;,e=>{
  const b=e.target.closest(&quot;.del&quot;);
  if(b){cart.splice(+b.dataset.del,1);renderCart();}
});

/* ===== 計算 ===== */
function mult(){return $(&quot;outside&quot;).checked?2:1;}
function calc(){
  const m=mult();
  let tests=0;
  cart.forEach((c,ci)=>{
    const sub=Math.round(lineAmount(c)*m);
    const cell=document.querySelector('[data-sub=&quot;'+ci+'&quot;]');
    if(cell)cell.textContent=sub.toLocaleString();
    const bd=document.querySelector('[data-bd=&quot;'+ci+'&quot;]');
    if(bd)bd.textContent=lineBreakdown(c)+(m===2?&quot; ×2&quot;:&quot;&quot;);
    tests+=sub;
  });
  const prepUnit=PREP_UNIT*m;
  const prep=cart.length>0?prepUnit:0;
  $(&quot;prepAmt&quot;).textContent=yen(prep);
  $(&quot;grand&quot;).textContent=yen(tests+prep);
  return {tests,prep,prepUnit,total:tests+prep,m};
}

/* ===== コピー用テキスト ===== */
function buildText(){
  const r=calc();
  let t=&quot;&quot;;
  let n=0;
  cart.forEach((c)=>{
    const sub=Math.round(lineAmount(c)*r.m);
    if(sub<=0)return;
    n++;
    t+=n+&quot;. &quot;+lineName(c)+&quot;\n&quot;;
    t+=&quot;   &quot;+(linePrice(c)*r.m).toLocaleString()+&quot;円/&quot;+lineUnit(c)+&quot; × &quot;+c.qty+lineUnit(c)+&quot; = &quot;+yen(sub)+&quot;\n&quot;;
  });
  t+=&quot;\n手数料 小計： &quot;+yen(r.tests)+&quot;\n&quot;;
  if(r.prep>0)t+=&quot;準備料： &quot;+yen(r.prep)+&quot;\n&quot;;
  t+=&quot;───────────────\n&quot;;
  t+=&quot;合計： &quot;+yen(r.total)+&quot;\n&quot;;
  return t;
}
function buildDetail(){
  const r=calc();const rows=[];
  cart.forEach(c=>{
    const sub=Math.round(lineAmount(c)*r.m);if(sub<=0)return;
    rows.push({name:lineName(c),note:(linePrice(c)*r.m).toLocaleString()+&quot;円/&quot;+lineUnit(c)+&quot; × &quot;+c.qty+lineUnit(c),amount:sub});
  });
  const extras=[{label:&quot;手数料 小計&quot;,amount:r.tests}];
  if(r.prep>0)extras.push({label:&quot;準備料&quot;,amount:r.prep});
  return {rows,extras,total:r.total,outside:r.m===2};
}
function captureState(){return {cart:cart.map(c=>({idx:c.idx,qty:c.qty,part:c.part})),outside:$(&quot;outside&quot;).checked};}
function restoreState(s){
  try{
    cart=(s.cart||[]).map(c=>({idx:c.idx,qty:c.qty,part:c.part}));
    $(&quot;outside&quot;).checked=!!s.outside;
    renderCart();toast(&quot;履歴から復元しました&quot;);
  }catch(e){}
}
window.addEventListener(&quot;message&quot;,e=>{
  const m=e.data;if(m&amp;&amp;m.type===&quot;restore-est&quot;&amp;&amp;m.source===&quot;依頼試験&quot;)restoreState(m.state);
});
function saveHistory(t){
  try{
    if(!t||!t.trim())return;
    const K=&quot;shimane_estimator_history&quot;;
    let a=JSON.parse(localStorage.getItem(K)||&quot;[]&quot;);
    if(!Array.isArray(a))a=[];
    a.unshift({id:Date.now()+&quot;_&quot;+Math.random().toString(36).slice(2,7),ts:Date.now(),source:&quot;依頼試験&quot;,text:t,detail:buildDetail(),state:captureState()});
    if(a.length>50)a=a.slice(0,50);
    localStorage.setItem(K,JSON.stringify(a));
  }catch(e){}
}
function copyText(){
  if(cart.length===0){toast(&quot;試験を追加してください&quot;);return;}
  const t=buildText();
  saveHistory(t);
  const done=()=>toast(&quot;コピーしました&quot;);
  if(navigator.clipboard&amp;&amp;navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));
  }else fallbackCopy(t,done);
}
function fallbackCopy(t,cb){
  const ta=document.createElement(&quot;textarea&quot;);ta.value=t;document.body.appendChild(ta);
  ta.select();try{document.execCommand(&quot;copy&quot;);cb();}catch(e){alert(&quot;コピーできませんでした。\n\n&quot;+t);}
  document.body.removeChild(ta);
}
function toast(m){const e=$(&quot;toast&quot;);e.textContent=m;e.classList.add(&quot;show&quot;);setTimeout(()=>e.classList.remove(&quot;show&quot;),1600);}

/* ===== イベント ===== */
let _t;$(&quot;q&quot;).oninput=()=>{clearTimeout(_t);_t=setTimeout(renderList,120);};
$(&quot;cat&quot;).onchange=renderList;
$(&quot;outside&quot;).onchange=calc;
$(&quot;copy&quot;).onclick=copyText;
$(&quot;clear&quot;).onclick=()=>{if(confirm(&quot;見積もりをクリアしますか？&quot;)){cart=[];renderCart();}};

renderFreq();renderList();renderCart();
</script>
</body>

"></iframe>
  <div class="panel" data-t="2" id="histPanel">
    <div class="hist-head">
      <h2>コピー履歴</h2>
      <span class="count" id="histCount"></span>
      <button class="clear" id="histClear">全削除</button>
    </div>
    <div id="histList"></div>
  </div>
</div>
<div id="histToast"></div>
<script>
  const KEY="shimane_estimator_tab2";
  const HKEY="shimane_estimator_history";
  const btns=document.querySelectorAll(".tabbar button");
  const frames=document.querySelectorAll(".frames [data-t]");
  function show(i){
    btns.forEach(b=>b.classList.toggle("active",b.dataset.t==i));
    frames.forEach(f=>f.classList.toggle("active",f.dataset.t==i));
    try{localStorage.setItem(KEY,i);}catch(e){}
    if(i=="2")renderHist();
  }
  btns.forEach(b=>b.addEventListener("click",()=>show(b.dataset.t)));

  /* ===== 履歴 ===== */
  const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  function loadHist(){try{const a=JSON.parse(localStorage.getItem(HKEY)||"[]");return Array.isArray(a)?a:[];}catch(e){return[];}}
  function saveHist(a){try{localStorage.setItem(HKEY,JSON.stringify(a));}catch(e){}}
  function fmtTs(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,"0");
    return d.getFullYear()+"/"+p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}
  function hToast(m){const e=document.getElementById("histToast");e.textContent=m;
    e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1500);}
  function copyTxt(t){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(()=>hToast("コピーしました")).catch(()=>fbCopy(t));
    }else fbCopy(t);
  }
  function fbCopy(t){const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);
    ta.select();try{document.execCommand("copy");hToast("コピーしました");}catch(e){alert(t);}document.body.removeChild(ta);}

  const yenP=n=>Number(n).toLocaleString("ja-JP")+"円";
  function detailHTML(d){
    let h='<table class="hd-table"><tbody>';
    (d.rows||[]).forEach(r=>{
      h+='<tr><td><div class="hd-name">'+esc(r.name)+'</div>'+
          (r.note?'<div class="hd-note">'+esc(r.note)+'</div>':'')+'</td>'+
          '<td class="hd-amt">'+yenP(r.amount)+'</td></tr>';
    });
    (d.extras||[]).forEach(x=>{
      h+='<tr class="hd-extra"><td>'+esc(x.label)+'</td><td class="hd-amt">'+yenP(x.amount)+'</td></tr>';
    });
    h+='<tr class="hd-total"><td>合計'+(d.outside?'<span class="hd-out">地域外×2</span>':'')+'</td>'+
        '<td class="hd-amt">'+yenP(d.total)+'</td></tr>';
    h+='</tbody></table>';
    return h;
  }
  function editInTab(item){
    const tabIdx=item.source==="機器開放"?"0":"1";
    show(tabIdx);
    const f=document.querySelector('.frames iframe[data-t="'+tabIdx+'"]');
    if(f&&f.contentWindow&&item.state){
      try{f.contentWindow.postMessage({type:"restore-est",source:item.source,state:item.state},"*");}catch(e){}
    }
  }
  function renderHist(){
    const list=document.getElementById("histList");
    const cnt=document.getElementById("histCount");
    const a=loadHist();
    cnt.textContent=a.length?"（"+a.length+"件）":"";
    if(!a.length){list.innerHTML='<div class="hist-empty">まだ履歴がありません。各タブで「テキストをコピー」すると、ここに記録されます。</div>';return;}
    list.innerHTML="";
    a.forEach((item,idx)=>{
      const card=document.createElement("div");card.className="hcard";
      const badge=item.source==="機器開放"?'<span class="badge eq">機器開放</span>':'<span class="badge test">依頼試験</span>';
      const canEdit=!!item.state;
      const bodyHTML=(item.detail&&item.detail.rows)?detailHTML(item.detail):'<pre>'+esc(item.text||"")+'</pre>';
      card.innerHTML=
        '<div class="meta">'+badge+'<span class="when">'+fmtTs(item.ts)+'</span>'+
          '<span class="acts">'+
            '<button class="c">コピー</button>'+
            (canEdit?'<button class="e">編集</button>':'')+
            '<button class="del d">削除</button>'+
          '</span>'+
        '</div>'+
        '<div class="body">'+bodyHTML+'</div>';
      card.querySelector(".c").onclick=()=>copyTxt(item.text||"");
      if(canEdit)card.querySelector(".e").onclick=()=>editInTab(item);
      card.querySelector(".d").onclick=()=>{
        const acts=card.querySelector(".acts");
        acts.innerHTML='<span class="cf-msg">削除しますか？</span>'+
          '<button class="cf-yes">削除</button><button class="cf-no">取消</button>';
        acts.querySelector(".cf-yes").onclick=()=>{
          const arr=loadHist();
          const next=item.id?arr.filter(x=>x.id!==item.id):arr.filter((_,i)=>i!==idx);
          saveHist(next);renderHist();
        };
        acts.querySelector(".cf-no").onclick=()=>renderHist();
      };
      list.appendChild(card);
    });
  }
  const clearBtn=document.getElementById("histClear");
  let clearArmed=false,clearTimer=null;
  clearBtn.onclick=()=>{
    if(!loadHist().length)return;
    if(clearArmed){
      clearArmed=false;clearTimeout(clearTimer);clearBtn.textContent="全削除";clearBtn.classList.remove("armed");
      saveHist([]);renderHist();return;
    }
    clearArmed=true;clearBtn.textContent="もう一度押すと全削除";clearBtn.classList.add("armed");
    clearTimer=setTimeout(()=>{clearArmed=false;clearBtn.textContent="全削除";clearBtn.classList.remove("armed");},2500);
  };
  /* 別タブ（iframe）でコピーされたら自動更新 */
  window.addEventListener("storage",e=>{
    if(e.key===HKEY&&document.querySelector('.panel[data-t="2"]').classList.contains("active"))renderHist();
  });

  let init="0";
  try{const s=localStorage.getItem(KEY);if(s!==null)init=s;}catch(e){}
  show(init);
</script>
